# SearXNG settings.yml — curated local configuration.
# Reuse engine definitions from the installed SearXNG release so module names,
# shortcuts and required engine fields stay compatible across image updates.
use_default_settings:
  engines:
    keep_only:
      - duckduckgo
      - duckduckgo news
      - brave
      - mojeek
      - presearch
      - wikidata
      - bing
      - wikipedia
      - arxiv
      - github
      - stackoverflow
      - semantic scholar

general:
  debug: false
  instance_name: "hermes-local"
  contact_url: ""
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ru-RU"
  formats:
    - html
    - json   # JSON обязателен для deep_research (иначе format=json → 403)

server:
  # В Docker контейнере bind на 0.0.0.0:8080 (тогда docker-compose пробрасывает 127.0.0.1:8888)
  bind_address: "0.0.0.0"
  port: 8080
  # secret_key is provided via the SEARXNG_SECRET env var (docker-compose.yml
  # passes it from .env_llm). Empty here means "use env override".
  # See DR-05062026(3) §P0.3.
  secret_key: ""
  base_url: false
  image_proxy: false
  enable_http2: false
  limiter: false  # single-user, лимитер выключен

# Valkey (Redis fork, требуется в SearXNG 2026.6+)
valkey:
  url: "valkey://valkey:6379/0"

outgoing:
  request_timeout: 8.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: false

engines:
  - name: duckduckgo
    disabled: false
    timeout: 5.0

  - name: duckduckgo news
    disabled: false
    timeout: 5.0

  - name: brave
    disabled: false
    timeout: 6.0

  - name: mojeek
    disabled: false
    timeout: 5.0

  - name: presearch
    disabled: false
    timeout: 5.0

  - name: wikidata
    disabled: false
    timeout: 5.0

  - name: bing
    disabled: false
    timeout: 6.0

  - name: wikipedia
    disabled: false
    timeout: 4.0
    display_type: ["infobox", "list"]

  - name: arxiv
    disabled: false
    timeout: 6.0

  - name: github
    disabled: false
    timeout: 5.0

  - name: stackoverflow
    disabled: false
    timeout: 5.0

  - name: semantic scholar
    disabled: false
    timeout: 6.0

# limiter disabled (this is single-user)
limiter: false

ui:
  static_path: ""
  templates_path: ""
  default_theme: simple
  results_on_new_tab: false
  advanced_search: false
  query_in_title: false
  infinite_scroll: false
