name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin Node.js 20 → 24 transition for JS-based actions (GitHub Actions
# deprecation: Node 20 default until 2026-06-16, removed 2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: pytest + ruff + eval smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check src tests scripts

      - name: Ruff format check
        run: |
          ruff format --check src scripts

      - name: Pytest
        env:
          OPENROUTER_API_KEY: not_a_real_key_dummy_for_ci
        run: |
          # v0.8.2-C1: tests no longer require a repo-root .env_llm
          # (TestEnvLlm uses tmp_path). The /opt/searxng/.env_llm
          # fabrication is kept as a no-op safety net for any
          # legacy code path that still reads it via _load_api_key;
          # OPENROUTER_API_KEY env var is the primary path and is
          # already set above.
          mkdir -p /opt/searxng
          python -c "open('/opt/searxng/.env_llm', 'w').write('LLM_API_KEY=dummy_for_ci_only\nLLM_MODEL=meta-llama/llama-3.1-8b-instruct:free\nSEARXNG_SECRET=dummy_for_ci_only\n')"
          chmod 600 /opt/searxng/.env_llm
          PYTHONPATH=src python -m pytest -q

      - name: Eval dry-run smoke
        # v0.8.1.3: pipeline smoke beyond unit tests. Catches routing,
        # adaptation, and synthesis regressions at CI time. Does NOT
        # require a running SearXNG instance (--no-network mode).
        run: |
          PYTHONPATH=src python scripts/eval.py --no-network --dry-run
