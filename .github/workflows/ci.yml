name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # dev extras come from pyproject.toml [project.optional-dependencies]
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check src tests scripts

      - name: Pytest
        run: |
          # Create dummy .env_llm in TWO locations:
          #   - /opt/searxng/.env_llm: read by src/llm_verifier.py::_load_api_key
          #     (hardcoded production path). Used by tests/test_llm_verifier.py.
          #   - $GITHUB_WORKSPACE/.env_llm: read by tests/test_compose_config.py::TestEnvLlm
          #     (test asserts file exists in repo root, mode 0600, contains SEARXNG_SECRET).
          # Real secrets never live in CI cache; placeholders are obvious dummies.
          mkdir -p /opt/searxng
          printf 'LLM_API_KEY=*** MODEL=meta-llama/llama-3.1-8b-instruct:free\nSEARXNG_SECRET=ci_pla...\n' | tee /opt/searxng/.env_llm .env_llm > /dev/null
          chmod 600 /opt/searxng/.env_llm .env_llm
          export OPENROUTER_API_KEY=*** PYTHONPATH=src python -m pytest -q
