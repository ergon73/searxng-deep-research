name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # dev extras come from pyproject.toml [project.optional-dependencies]
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check src tests scripts

      - name: Pytest
        env:
          OPENROUTER_API_KEY: not_a_real_key_dummy_for_ci
        run: |
          # Create dummy .env_llm in TWO locations (real secrets never live in CI cache):
          #   - /opt/searxng/.env_llm: read by src/llm_verifier.py::_load_api_key
          #   - $GITHUB_WORKSPACE/.env_llm: read by tests/test_compose_config.py::TestEnvLlm
          mkdir -p /opt/searxng
          python -c "open('/opt/searxng/.env_llm', 'w').write('LLM_API_KEY=dummy_for_ci_only\nLLM_MODEL=meta-llama/llama-3.1-8b-instruct:free\nSEARXNG_SECRET=dummy_for_ci_only\n')"
          cp /opt/searxng/.env_llm .env_llm
          chmod 600 /opt/searxng/.env_llm .env_llm
          PYTHONPATH=src python -m pytest -q
